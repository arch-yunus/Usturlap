<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usturlap | Sovereign Celestial Oracle</title>
    <link rel="stylesheet" href="static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <header>
            <div class="logo">🔭 Usturlap</div>
            <div class="badge">Sovereign Engine v1.0</div>
        </header>
        
        <main>
            <section class="controls glass">
                <h2>Doğum Bilgileri</h2>
                <div class="form-group">
                    <label>Tarih & Saat</label>
                    <input type="datetime-local" id="datetime" value="2002-04-10T14:30">
                </div>
                <div class="form-group">
                    <label>Enlem (Latitude)</label>
                    <input type="number" id="lat" value="41.0082" step="0.0001">
                </div>
                <div class="form-group">
                    <label>Boylam (Longitude)</label>
                    <input type="number" id="lon" value="28.9784" step="0.0001">
                </div>
                <div class="form-group">
                    <label>Dil (Language)</label>
                    <select id="lang">
                        <option value="tr">Türkçe</option>
                        <option value="en">English</option>
                    </select>
                </div>
                <button id="calculate-btn" class="primary-btn">Haritayı Hesapla</button>
                <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                    <button id="save-chart-btn" class="secondary-btn">Haritayı Kaydet</button>
                    <button id="download-pdf-btn" class="secondary-btn">PDF Raporu</button>
                </div>

                <div class="history-section glass" style="margin-top: 2rem; padding: 1.5rem;">
                    <h3>Kayıtlı Haritalar</h3>
                    <div id="history-list" class="list-container">
                        <div class="placeholder">Geçmiş yükleniyor...</div>
                    </div>
                </div>
            </section>

            <section class="display">
                <div id="chart-visual" class="glass chart-container">
                    <div class="placeholder">Harita verisi bekleniyor...</div>
                </div>
                <div id="interpretation" class="glass text-container">
                    <h3>Analiz Raporu</h3>
                    <div id="interpret-content" class="content">Analiz sonuçları burada görünecektir.</div>
                </div>
            </section>
        </main>
    </div>
    <script src="static/app.js"></script>
</body>
</html>
